name: native_video_editor
description: A Flutter plugin for native video edits using AVFoundation and AndroidX Media3 Transformer.
version: 0.0.2
repository: https://github.com/MuhammadFahad0/native_video_editor
issue_tracker: https://github.com/MuhammadFahad0/native_video_editor/issues
topics:
  - video
  - video-editor
  - media
  - android
  - ios

environment:
  sdk: ^3.8.0
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.native_video_editor
        pluginClass: NativeVideoEditorPlugin
      ios:
        pluginClass: NativeVideoEditorPlugin
